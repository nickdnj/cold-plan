<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <clipPath id="capsule">
      <rect x="8" y="18" width="48" height="28" rx="14"/>
    </clipPath>
  </defs>
  <!-- Full capsule shape as clip -->
  <g clip-path="url(#capsule)">
    <!-- Left half - dark blue -->
    <rect x="8" y="18" width="24" height="28" fill="#2563eb"/>
    <!-- Right half - light blue -->
    <rect x="32" y="18" width="24" height="28" fill="#60a5fa"/>
  </g>
  <!-- Plus sign on dark half -->
  <rect x="17" y="29.5" width="11" height="5" rx="1" fill="white"/>
  <rect x="20" y="26.5" width="5" height="11" rx="1" fill="white"/>
</svg>
